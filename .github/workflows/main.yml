name: VertexWatch
 
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"
 
# Prevent concurrent runs - only one environment at a time
concurrency:
  group: vertexwatch-monitors
  cancel-in-progress: false
 
jobs:
 
  monitor-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            snapshot_dev.json
            change_log_dev.json
          key: vertexwatch-dev-${{ github.run_id }}
          restore-keys: |
            vertexwatch-dev-
 
      - name: Run monitor (dev)
        env:
          ENV_TARGET:     dev
          DEV_USERNAME:   ${{ secrets.DEV_USERNAME }}
          DEV_PASSWORD:   ${{ secrets.DEV_PASSWORD }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_EMAIL:    ${{ secrets.ALERT_EMAIL }}
        run: python monitor.py
 
      - name: Upload dev logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-dev
          path: change_log_dev.json
          if-no-files-found: ignore
 
  monitor-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
