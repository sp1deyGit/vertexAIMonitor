name: VertexWatch Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:  

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 6 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run VertexWatch monitor loop
        env:
          VERTEX_USERNAME:      ${{ secrets.VERTEX_USERNAME }}
          VERTEX_PASSWORD:      ${{ secrets.VERTEX_PASSWORD }}
          EMAILJS_SERVICE_ID:   ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID:  ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY:   ${{ secrets.EMAILJS_PUBLIC_KEY }}
          ALERT_EMAIL:          ${{ secrets.ALERT_EMAIL }}
        run: python monitor.py

      # Persist snapshot between runs using Actions cache
      - name: Save snapshot cache
        uses: actions/cache@v4
        with:
          path: snapshot.json
          key: vertexwatch-snapshot-${{ github.run_id }}
          restore-keys: vertexwatch-snapshot-

      - name: Upload change log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: change-log-${{ github.run_id }}
          path: change_log.json
          if-no-files-found: ignore
          retention-days: 30
